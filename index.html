<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring DIY BLORA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4 font-sans">

    <div id="loginPage" class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl mt-20">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-slate-800">DIY BLORA</h2>
            <p class="text-slate-500 mt-2">Pilih toko dan masukkan password</p>
        </div>
        <div class="space-y-5">
            <div>
                <label class="block text-sm font-semibold mb-1 text-slate-600">Pilih Toko</label>
                <select id="tokoSelect" class="w-full p-3 border-2 border-slate-100 rounded-xl focus:border-blue-500 outline-none transition">
                    <option value="XLUN">Toko XLUN</option>
                    <option value="XBLO">Toko XBLO</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1 text-slate-600">Password</label>
                <input type="password" id="password" placeholder="••••••••" class="w-full p-3 border-2 border-slate-100 rounded-xl focus:border-blue-500 outline-none transition">
            </div>
            <button onclick="loginToko()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition duration-200">
                Masuk ke Panel
            </button>
        </div>
    </div>

    <div id="mainPage" class="hidden max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
            <div>
                <h1 id="displayToko" class="text-2xl font-black text-blue-700 uppercase tracking-tight"></h1>
                <p class="text-slate-400 text-xs">User: rdhmal13@gmail.com</p>
            </div>
            <button onclick="logout()" class="mt-4 md:mt-0 bg-red-50 text-red-600 px-6 py-2 rounded-full text-sm font-bold hover:bg-red-100 transition">
                Keluar / Ganti Toko
            </button>
        </div>

        <form id="formInput" class="bg-white p-8 rounded-2xl shadow-sm mb-10 border border-slate-200">
            <h3 class="text-lg font-bold mb-6 border-b pb-2 text-slate-700">Input Temuan Baru</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Tanggal</label>
                    <input type="date" id="tanggal" required class="w-full border-b-2 border-slate-100 p-2 focus:border-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Jabatan</label>
                    <select id="jabatan" class="w-full border-b-2 border-slate-100 p-2 focus:border-blue-500 outline-none transition">
                        <option>RM</option><option>AM</option><option>DM</option><option>BM</option><option>ABM</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Temuan</label>
                    <textarea id="temuan" rows="2" required class="w-full border-b-2 border-slate-100 p-2 focus:border-blue-500 outline-none transition" placeholder="Deskripsikan temuan..."></textarea>
                </div>
                <div class="bg-slate-50 p-4 rounded-xl">
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-2">Foto Before</label>
                    <input type="file" id="fotoBefore" accept="image/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                </div>
                <div class="bg-slate-50 p-4 rounded-xl">
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-2">Foto After</label>
                    <input type="file" id="fotoAfter" accept="image/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Remark</label>
                    <input type="text" id="remark" class="w-full border-b-2 border-slate-100 p-2 focus:border-blue-500 outline-none transition" placeholder="Catatan tambahan...">
                </div>
            </div>
            <button type="submit" id="btnSimpan" class="w-full mt-8 bg-slate-800 text-white font-bold py-4 rounded-xl hover:bg-black shadow-xl transition duration-300">
                Simpan Temuan ke Database
            </button>
        </form>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-5 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                <span class="font-bold text-slate-700 italic underline">Data Monitoring Realtime</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="bg-slate-50 text-slate-500 uppercase text-[10px] tracking-widest">
                        <tr>
                            <th class="p-4">Tanggal</th><th class="p-4">Jabatan</th><th class="p-4">Temuan</th>
                            <th class="p-4 text-center">Foto</th><th class="p-4">Remark</th>
                            <th class="p-4">Komentar SPV</th><th class="p-4">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="dataList" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // !!! GANTI DENGAN CONFIG ASLI DARI FIREBASE CONSOLE !!!
        const firebaseConfig = {
            apiKey: "MASUKKAN_API_KEY_ANDA",
            authDomain: "diyblora.firebaseapp.com",
            databaseURL: "https://diyblora-default-rtdb.firebaseio.com",
            projectId: "diyblora",
            storageBucket: "diyblora.appspot.com",
            messagingSenderId: "XXXXXXXX",
            appId: "XXXXXXXX"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const storage = getStorage(app);

        // LOGIN SYSTEM
        window.loginToko = () => {
            const toko = document.getElementById('tokoSelect').value;
            const pass = document.getElementById('password').value;
            const email = "rdhmal13@gmail.com"; 

            signInWithEmailAndPassword(auth, email, pass)
                .then(() => {
                    sessionStorage.setItem("activeToko", toko);
                })
                .catch(err => alert("Password Salah atau Provider Belum Aktif!"));
        };

        window.logout = () => {
            sessionStorage.removeItem("activeToko");
            signOut(auth);
        };

        onAuthStateChanged(auth, (user) => {
            const savedToko = sessionStorage.getItem("activeToko");
            if (user && savedToko) {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('mainPage').classList.remove('hidden');
                document.getElementById('displayToko').innerText = "Toko: " + savedToko;
                loadData(savedToko);
            } else {
                document.getElementById('loginPage').classList.remove('hidden');
                document.getElementById('mainPage').classList.add('hidden');
            }
        });

        // UPLOAD & SAVE DATA
        document.getElementById('formInput').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSimpan');
            btn.disabled = true; btn.innerText = "Sedang Mengupload...";

            const toko = sessionStorage.getItem("activeToko");
            const fBefore = document.getElementById('fotoBefore').files[0];
            const fAfter = document.getElementById('fotoAfter').files[0];

            try {
                const urlB = fBefore ? await uploadFile(fBefore, 'before') : "";
                const urlA = fAfter ? await uploadFile(fAfter, 'after') : "";

                const data = {
                    tanggal: document.getElementById('tanggal').value,
                    jabatan: document.getElementById('jabatan').value,
                    temuan: document.getElementById('temuan').value,
                    fotoBefore: urlB, 
                    fotoAfter: urlA,
                    remark: document.getElementById('remark').value,
                    komentarSPV: "",
                    aksi: "Pending",
                    created_at: Date.now()
                };

                await push(ref(db, `monitoring/${toko}`), data);
                alert("Data berhasil dikirim!");
                e.target.reset();
            } catch (error) { 
                alert("Gagal: " + error.message); 
            }
            btn.disabled = false; btn.innerText = "Simpan Temuan ke Database";
        };

        async function uploadFile(file, type) {
            const storageRef = sRef(storage, `monitoring/${Date.now()}_${type}`);
            await uploadBytes(storageRef, file);
            return getDownloadURL(storageRef);
        }

        // TAMPILKAN DATA (MONITORING)
        function loadData(toko) {
            onValue(ref(db, `monitoring/${toko}`), (snapshot) => {
                const list = document.getElementById('dataList');
                list.innerHTML = "";
                snapshot.forEach((child) => {
                    const d = child.val();
                    list.innerHTML += `
                        <tr class="hover:bg-slate-50 border-b border-slate-100 transition">
                            <td class="p-4 text-slate-700 font-medium">${d.tanggal}</td>
                            <td class="p-4"><span class="bg-slate-200 px-2 py-1 rounded text-xs">${d.jabatan}</span></td>
                            <td class="p-4 text-slate-600">${d.temuan}</td>
                            <td class="p-4 text-center">
                                <div class="flex justify-center space-x-2">
                                    ${d.fotoBefore ? `<a href="${d.fotoBefore}" target="_blank" class="text-blue-500 hover:underline text-xs font-bold italic">Before</a>` : '-'}
                                    ${d.fotoAfter ? `<a href="${d.fotoAfter}" target="_blank" class="text-green-500 hover:underline text-xs font-bold italic">After</a>` : ''}
                                </div>
                            </td>
                            <td class="p-4 text-slate-500 italic text-xs">${d.remark || '-'}</td>
                            <td class="p-4">
                                <input type="text" placeholder="Isi komentar..." value="${d.komentarSPV}" onchange="updateData('${toko}','${child.key}', 'komentarSPV', this.value)" class="border rounded p-2 w-full text-xs outline-none focus:bg-yellow-50 focus:border-yellow-300">
                            </td>
                            <td class="p-4">
                                <select onchange="updateData('${toko}','${child.key}', 'aksi', this.value)" class="text-xs font-bold p-2 border rounded bg-white">
                                    <option ${d.aksi == 'Pending' ? 'selected' : ''} class="text-red-500">Pending</option>
                                    <option ${d.aksi == 'Selesai' ? 'selected' : ''} class="text-green-600">Selesai</option>
                                </select>
                            </td>
                        </tr>`;
                });
            });
        }

        window.updateData = (toko, id, field, value) => {
            update(ref(db, `monitoring/${toko}/${id}`), { [field]: value });
        };
    </script>
</body>
</html>
