<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring DIY BLORA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-100 p-4">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm">
            <div>
                <h1 class="text-2xl font-black text-slate-800">DIY BLORA MONITORING</h1>
                <div class="flex gap-4 mt-2">
                    <button onclick="loadData('XLUN')" class="text-xs font-bold bg-blue-600 text-white px-4 py-1 rounded-full">UNIT XLUN</button>
                    <button onclick="loadData('XBLO')" class="text-xs font-bold bg-purple-600 text-white px-4 py-1 rounded-full">UNIT XBLO</button>
                </div>
            </div>
            <a href="input.html" class="text-[10px] font-bold text-slate-400 border px-3 py-1 rounded-lg hover:bg-gray-50">LOGIN STAFF</a>
        </div>

        <div id="displayGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const cfg = { databaseURL: "https://diyblora-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        const app = initializeApp(cfg);
        const db = getDatabase(app);

        window.loadData = (toko) => {
            onValue(ref(db, `monitoring/${toko}`), (snap) => {
                const grid = document.getElementById('displayGrid');
                grid.innerHTML = "";
                let data = [];
                snap.forEach(c => { data.push(c.val()); });
                data.reverse().forEach(d => {
                    const statusColor = d.aks === 'Selesai' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700';
                    grid.innerHTML += `
                        <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100">
                            <div class="p-2 grid grid-cols-2 gap-1">
                                <img src="${d.fB || ''}" class="h-40 w-full object-cover rounded-xl bg-gray-50" onerror="this.src='https://via.placeholder.com/150?text=No+Photo'">
                                <img src="${d.fA || ''}" class="h-40 w-full object-cover rounded-xl bg-gray-50" onerror="this.src='https://via.placeholder.com/150?text=No+Photo'">
                            </div>
                            <div class="p-5">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-[10px] font-black uppercase text-blue-600">${d.jbt}</span>
                                    <span class="${statusColor} text-[9px] font-bold px-2 py-0.5 rounded-full">${d.aks}</span>
                                </div>
                                <h4 class="font-bold text-slate-800 text-sm mb-1">${d.tmn}</h4>
                                <div class="mt-4 p-3 bg-slate-50 rounded-xl">
                                    <p class="text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-widest">Komentar SPV:</p>
                                    <p class="text-xs text-slate-600 italic">${d.spv || 'Belum ada komentar.'}</p>
                                </div>
                                <p class="text-[9px] text-right mt-3 text-slate-400">${d.tgl}</p>
                            </div>
                        </div>`;
                });
            });
        };
        loadData('XLUN'); // Load default
    </script>
</body>
</html>
