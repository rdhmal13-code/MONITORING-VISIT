<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIY BLORA - Fast Monitoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 800; }
        .card { transition: transform 0.2s; }
        .card:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="pb-20">

    <div class="bg-white border-b sticky top-0 z-50 p-4 shadow-sm">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="font-black text-xl tracking-tighter text-slate-800">DIY BLORA</h1>
            <div class="flex gap-6 text-xs font-bold text-slate-400">
                <button onclick="showTab('view')" id="tView" class="tab-active py-2">MONITORING</button>
                <button onclick="showTab('add')" id="tAdd" class="py-2">INPUT DATA</button>
            </div>
        </div>
    </div>

    <div id="viewPage" class="max-w-4xl mx-auto p-4 space-y-6">
        <div class="flex gap-2">
            <button onclick="loadData('XLUN')" class="bg-slate-800 text-white px-4 py-2 rounded-full text-[10px] font-bold">UNIT XLUN</button>
            <button onclick="loadData('XBLO')" class="bg-blue-600 text-white px-4 py-2 rounded-full text-[10px] font-bold">UNIT XBLO</button>
        </div>
        <div id="gridData" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            </div>
    </div>

    <div id="addPage" class="hidden max-w-md mx-auto p-4">
        <div id="lock" class="bg-white p-6 rounded-3xl shadow-xl border text-center">
            <p class="font-bold mb-4">Input Password Staff</p>
            <input type="password" id="pw" class="w-full p-3 border rounded-xl mb-4 text-center">
            <button onclick="unlock()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold">Buka Form</button>
        </div>

        <form id="fInput" class="hidden bg-white p-6 rounded-3xl shadow-xl border space-y-4 text-slate-800">
            <h2 class="font-black text-lg">Input Temuan</h2>
            <select id="toko" class="w-full border-b p-2 font-bold text-blue-600"><option value="XLUN">UNIT XLUN</option><option value="XBLO">UNIT XBLO</option></select>
            <input type="date" id="tgl" required class="w-full border-b p-2">
            <select id="jbt" class="w-full border-b p-2"><option>RM</option><option>AM</option><option>DM</option><option>BM</option><option>ABM</option></select>
            <textarea id="tmn" placeholder="Apa temuannya?" required class="w-full border p-3 rounded-xl h-24 text-sm"></textarea>
            
            <div class="grid grid-cols-2 gap-2">
                <div class="text-center">
                    <p class="text-[9px] font-bold">BEFORE</p>
                    <input type="file" id="fB" accept="image/*" class="hidden" onchange="readImg(this, 'pB')">
                    <img id="pB" onclick="document.getElementById('fB').click()" src="https://via.placeholder.com/150?text=Foto" class="w-full h-32 object-cover rounded-xl border-2 border-dashed cursor-pointer">
                </div>
                <div class="text-center">
                    <p class="text-[9px] font-bold">AFTER</p>
                    <input type="file" id="fA" accept="image/*" class="hidden" onchange="readImg(this, 'pA')">
                    <img id="pA" onclick="document.getElementById('fA').click()" src="https://via.placeholder.com/150?text=Foto" class="w-full h-32 object-cover rounded-xl border-2 border-dashed cursor-pointer">
                </div>
            </div>
            
            <button type="submit" id="btn" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg">SIMPAN INSTAN</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Pakai Database URL saja agar sangat ringan
        const app = initializeApp({ databaseURL: "https://diyblora-default-rtdb.asia-southeast1.firebasedatabase.app/" });
        const db = getDatabase(app);
        let currentToko = 'XLUN';

        // Navigasi Tab
        window.showTab = (t) => {
            document.getElementById('viewPage').classList.toggle('hidden', t !== 'view');
            document.getElementById('addPage').classList.toggle('hidden', t !== 'add');
            document.getElementById('tView').className = t === 'view' ? 'tab-active py-2' : 'py-2';
            document.getElementById('tAdd').className = t === 'add' ? 'tab-active py-2' : 'py-2';
        };

        window.unlock = () => {
            if(document.getElementById('pw').value === "123") {
                document.getElementById('lock').classList.add('hidden');
                document.getElementById('fInput').classList.remove('hidden');
            }
        };

        // Baca Gambar & Kompres Instan ke Teks (Base64)
        window.readImg = (input, target) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 400; canvas.height = (img.height/img.width)*400; // Kecilkan ke 400px
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    document.getElementById(target).src = canvas.toDataURL('image/jpeg', 0.5); // Kualitas 50%
                };
            };
            reader.readAsDataURL(input.files[0]);
        };

        // Simpan Data
        document.getElementById('fInput').onsubmit = async (e) => {
            e.preventDefault();
            const b = document.getElementById('btn');
            b.disabled = true; b.innerText = "Menyimpan...";

            await push(ref(db, `monitoring/${document.getElementById('toko').value}`), {
                tgl: document.getElementById('tgl').value,
                jbt: document.getElementById('jbt').value,
                tmn: document.getElementById('tmn').value,
                imgB: document.getElementById('pB').src,
                imgA: document.getElementById('pA').src,
                spv: "", time: Date.now()
            });

            alert("Tersimpan!");
            location.reload();
        };

        // Muat Data (Seringan Struktural)
        window.loadData = (toko) => {
            currentToko = toko;
            onValue(ref(db, `monitoring/${toko}`), (s) => {
                const g = document.getElementById('gridData');
                g.innerHTML = "";
                let arr = []; s.forEach(c => { arr.push({id:c.key, ...c.val()}); });
                arr.reverse().forEach(d => {
                    g.innerHTML += `
                    <div class="card bg-white p-3 rounded-3xl shadow-sm border border-slate-100 flex flex-col">
                        <div class="grid grid-cols-2 gap-1 mb-3">
                            <img src="${d.imgB}" class="h-32 w-full object-cover rounded-2xl bg-slate-50">
                            <img src="${d.imgA}" class="h-32 w-full object-cover rounded-2xl bg-slate-50">
                        </div>
                        <div class="flex justify-between items-center mb-1 text-[10px] font-black text-blue-600 uppercase">
                            <span>${d.jbt}</span><span class="text-slate-300">${d.tgl}</span>
                        </div>
                        <p class="text-sm font-bold text-slate-800 mb-3">${d.tmn}</p>
                        <div class="mt-auto pt-3 border-t">
                            <p class="text-[9px] font-black text-slate-300 uppercase mb-1">Feedback:</p>
                            <p class="text-xs italic text-slate-500">${d.spv || 'Waiting...'}</p>
                        </div>
                        <button onclick="hapus('${d.id}')" class="mt-3 text-[9px] text-red-400 font-bold text-right">HAPUS DATA</button>
                    </div>`;
                });
            });
        };

        window.hapus = (id) => { if(confirm("Hapus?")) remove(ref(db, `monitoring/${currentToko}/${id}`)); };
        
        loadData('XLUN');
    </script>
</body>
</html>
