<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIY BLORA - Instant Upload</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .img-preview { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; background: #eee; }
        .loading-ring { border: 2px solid #f3f3f3; border-top: 2px solid #3498db; border-radius: 50%; width: 14px; height: 14px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 p-2">

    <div id="loginPage" class="max-w-xs mx-auto mt-20 bg-white p-6 rounded-xl shadow-lg text-center">
        <h2 class="font-black text-xl mb-4">DIY BLORA</h2>
        <input type="password" id="passInput" placeholder="Password" class="w-full p-2 border mb-4 rounded">
        <button onclick="masuk()" class="w-full bg-blue-600 text-white py-2 rounded font-bold">MASUK</button>
    </div>

    <div id="mainPage" class="hidden max-w-4xl mx-auto">
        <form id="fInput" class="bg-white p-4 rounded-xl shadow-sm mb-4 border space-y-3">
            <div class="grid grid-cols-2 gap-2">
                <input type="date" id="tgl" required class="border-b p-1 text-sm">
                <select id="jbt" class="border-b p-1 text-sm"><option>RM</option><option>AM</option><option>DM</option><option>BM</option><option>ABM</option></select>
            </div>
            <textarea id="tmn" placeholder="Input temuan..." required class="w-full border-b p-1 text-sm h-12"></textarea>
            
            <div class="grid grid-cols-2 gap-2">
                <div class="text-center">
                    <span class="text-[9px] font-bold text-gray-400">BEFORE</span>
                    <input type="file" id="fB" accept="image/*" class="hidden" onchange="preview(this, 'preB')">
                    <img id="preB" onclick="document.getElementById('fB').click()" src="https://via.placeholder.com/150?text=Klik+Foto" class="img-preview cursor-pointer border-2 border-dashed">
                </div>
                <div class="text-center">
                    <span class="text-[9px] font-bold text-gray-400">AFTER</span>
                    <input type="file" id="fA" accept="image/*" class="hidden" onchange="preview(this, 'preA')">
                    <img id="preA" onclick="document.getElementById('fA').click()" src="https://via.placeholder.com/150?text=Klik+Foto" class="img-preview cursor-pointer border-2 border-dashed">
                </div>
            </div>

            <button type="submit" id="btn" class="w-full bg-slate-800 text-white py-3 rounded-lg font-bold">KIRIM SEKARANG</button>
        </form>

        <div id="list" class="space-y-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const cfg = {
            apiKey: "MASUKKAN_API_KEY_ANDA",
            databaseURL: "https://diyblora-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "diyblora",
            storageBucket: "diyblora.appspot.com"
        };

        const app = initializeApp(cfg);
        const db = getDatabase(app);
        const st = getStorage(app);
        let tk = "XBLO"; // Default

        window.masuk = () => {
            if(document.getElementById('passInput').value === "123") {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('mainPage').style.display = 'block';
                load();
            }
        };

        // Fungsi Preview Instan
        window.preview = (input, targetId) => {
            const file = input.files[0];
            if (file) {
                document.getElementById(targetId).src = URL.createObjectURL(file);
            }
        };

        document.getElementById('fInput').onsubmit = async (e) => {
            e.preventDefault();
            const b = document.getElementById('btn');
            b.disabled = true; b.innerHTML = "Mengirim...";

            const fileB = document.getElementById('fB').files[0];
            const fileA = document.getElementById('fA').files[0];

            try {
                // 1. Upload Gambar secara paralel
                const [uB, uA] = await Promise.all([
                    fileB ? up(fileB, 'B') : Promise.resolve(""),
                    fileA ? up(fileA, 'A') : Promise.resolve("")
                ]);

                // 2. Simpan Data ke Database
                await push(ref(db, `monitoring/${tk}`), {
                    tgl: document.getElementById('tgl').value,
                    jbt: document.getElementById('jbt').value,
                    tmn: document.getElementById('tmn').value,
                    fB: uB, fA: uA,
                    spv: "", aks: "Pending", time: Date.now()
                });

                alert("Terkirim!");
                e.target.reset();
                document.getElementById('preB').src = "https://via.placeholder.com/150?text=Klik+Foto";
                document.getElementById('preA').src = "https://via.placeholder.com/150?text=Klik+Foto";
            } catch (err) { alert("Gagal!"); }
            b.disabled = false; b.innerHTML = "KIRIM SEKARANG";
        };

        async function up(f, n) {
            const r = sRef(st, `m/${Date.now()}_${n}.jpg`);
            await uploadBytes(r, f);
            return getDownloadURL(r);
        }

        function load() {
            onValue(ref(db, `monitoring/${tk}`), (s) => {
                const l = document.getElementById('list'); l.innerHTML = "";
                let arr = []; s.forEach(c => { arr.push({id:c.key, ...c.val()}); });
                arr.reverse().forEach(d => {
                    l.innerHTML += `
                    <div class="bg-white p-3 rounded-lg shadow-sm border">
                        <div class="flex gap-2 mb-2">
                            <img src="${d.fB || ''}" class="w-1/2 h-24 object-cover rounded bg-gray-100" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
                            <img src="${d.fA || ''}" class="w-1/2 h-24 object-cover rounded bg-gray-100" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
                        </div>
                        <div class="text-[11px]">
                            <div class="flex justify-between font-bold text-blue-600"><span>${d.tgl}</span><span>${d.jbt}</span></div>
                            <div class="mt-1 font-bold">${d.tmn}</div>
                            <textarea onchange="upd('${d.id}', 'spv', this.value)" class="w-full border mt-2 p-1 rounded" placeholder="Komentar...">${d.spv}</textarea>
                            <div class="flex gap-2 mt-2">
                                <select onchange="upd('${d.id}', 'aks', this.value)" class="flex-1 border rounded p-1">
                                    <option ${d.aks=='Pending'?'selected':''}>Pending</option>
                                    <option ${d.aks=='Selesai'?'selected':''}>Selesai</option>
                                </select>
                                <button onclick="hapus('${d.id}')" class="bg-red-50 text-red-500 px-3 rounded">Hapus</button>
                            </div>
                        </div>
                    </div>`;
                });
            });
        }

        window.upd = (id, f, v) => { update(ref(db, `monitoring/${tk}/${id}`), { [f]: v }); };
        window.hapus = (id) => { if(confirm("Hapus?")) remove(ref(db, `monitoring/${tk}/${id}`)); };
    </script>
</body>
</html>
